<!DOCTYPE html5>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CREATIVE BLOCK BUSTER</title>
    <link rel="stylesheet" href="https://use.typekit.net/oqm8rib.css">
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <div id="date-time"></div>                    
    <h1>Creative Block Buster</h1>

    <div class="wrapper">
        <div class="left-column">
            <div class="intro-container">
                <div id="intro-text"></div>
            </div>
        </div>

        <div class="right-column">
            <div class="container">
                <div id="prompt-output" class="prompt-output hide-initially"></div>
                <button id="generate-prompt-btn" class="button hide-initially">Generate Prompt</button>
                <textarea id="user-response-input" rows="4" cols="50" class="hide-initially" placeholder="Enter your response here..."></textarea>
                <p id="character-count" class="hide-initially">Characters: 0</p>
                <button id="submit-response-btn" class="button hide-initially">Submit Response</button>
                <div id="success-message" class="success-message"></div>
                <button id="copyToClipboard" class="button hide-initially">Copy Your Micro Masterpiece</button>
                <div id="timer-progress-bar" class="hide-initially"></div>
                <div id="timer" class="timer hide-initially"></div>
            </div>
        </div>
    </div>
    <script src="static/scripts.js"></script>
    <footer>Made with <3 for Karanjeet</footer>
</body>
</html>
