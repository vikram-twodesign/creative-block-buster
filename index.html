<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CREATIVE BLOCK BUSTER</title>
    
    <link rel="stylesheet" href="https://use.typekit.net/oqm8rib.css">
    <link rel="stylesheet" href="static/styles.css">

    
</head>
<body>
    <div id="date-time"></div>
  <div class="wrapper">
    <div class="container">
        <h1>Creative Block Buster</h1>
        <p id="intro-text"></p>
        <div id="prompt-output" class="prompt-output"></div>
        <button id="generate-prompt-btn" class="button">Generate Prompt</button>
            <textarea id="user-response-input" rows="4" cols="50" placeholder="Enter your response here..."></textarea>
        <p id="character-count">Characters: 0</p>
        <button id="submit-response-btn" class="button">Submit Response</button>
        <div id="success-message" class="success-message"></div>
        <button id="copyToClipboard" class="button" style="display:none;">Copy Your Micro Masterpiece</button>
        <div id="timer-progress-bar"></div>
        <div id="timer" class="timer"></div>
    </div>
  </div>
    <script src="static/scripts.js"></script>
</body>
    
    <footer>Made with <3 for Karanjeet</footer>

    
</html>
